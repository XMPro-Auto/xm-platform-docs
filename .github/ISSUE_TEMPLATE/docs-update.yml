name: Documentation Update Request
description: Request a change or addition to XMPro documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: dropdown
    id: version
    attributes:
      label: Platform Version
      description: Which version of the documentation needs updating?
      options:
        - v4.4
        - v4.5
        - v4.6
        - v5.0
        - All versions
    validations:
      required: true
  - type: dropdown
    id: change-type
    attributes:
      label: Type of Change
      options:
        - Fix incorrect information
        - Add missing content
        - Update existing content
        - Improve clarity/readability
        - Add images/screenshots
        - Other
    validations:
      required: true
  - type: textarea
    id: page
    attributes:
      label: Affected Page(s)
      description: Which page(s) need to be updated? Provide the path or URL if possible.
      placeholder: e.g., installation/deployment/azure-terraform/index.md
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the Change
      description: What needs to be changed and why?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any additional context, screenshots, or links that would help.
    validations:
      required: false
