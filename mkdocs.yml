site_name: XMPro Platform Documentation (v4.4)
site_url: https://docs.xmpro.com/
site_description: Documentation for the XMPro Intelligent Digital Twin Suite
repo_url: https://github.com/XMPro-Auto/xm-platform-docs
repo_name: xm-platform-docs
edit_uri: edit/main/docs/

theme:
  name: material
  logo: images/logo-dark.png
  favicon: images/favicon.png
  font: false
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2025 XMPro. All rights reserved.

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/XMPro-Auto
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/xmpro

plugins:
  - search
  - mike:
      alias_type: symlink
      canonical_version: null

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
